<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>
  
  <!-- 7K Text -->
  <text x="256" y="220" font-family="Arial Black, sans-serif" font-size="180" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">7K</text>
  
  <!-- FIT Text -->
  <text x="256" y="360" font-family="Arial Black, sans-serif" font-size="100" font-weight="900" fill="#F59E0B" text-anchor="middle" dominant-baseline="middle">FIT</text>
  
  <!-- Dumbbell at bottom -->
  <g transform="translate(256, 460)">
    <rect x="-50" y="-6" width="100" height="12" rx="3" fill="white"/>
    <rect x="-70" y="-16" width="22" height="32" rx="3" fill="white"/>
    <rect x="48" y="-16" width="22" height="32" rx="3" fill="white"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7931E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>
  
  <!-- Inner Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#FFFFFF" stroke-width="8" opacity="0.3"/>
  
  <!-- 7K Text -->
  <text x="256" y="220" font-family="Arial Black, Arial, sans-serif" font-size="140" font-weight="900" fill="url(#accentGradient)" text-anchor="middle" dominant-baseline="middle">7K</text>
  
  <!-- FIT Text -->
  <text x="256" y="320" font-family="Arial, sans-serif" font-size="80" font-weight="700" fill="url(#accentGradient)" text-anchor="middle" dominant-baseline="middle" letter-spacing="15">FIT</text>
  
  <!-- Decorative Fitness Elements - Dumbbell shape on sides -->
  <g fill="#FFFFFF" opacity="0.4">
    <!-- Left dumbbell -->
    <rect x="60" y="240" width="25" height="32" rx="4"/>
    <rect x="85" y="250" width="30" height="12" rx="2"/>
    
    <!-- Right dumbbell -->
    <rect x="427" y="240" width="25" height="32" rx="4"/>
    <rect x="397" y="250" width="30" height="12" rx="2"/>
  </g>
  
  <!-- Pulse/Heartbeat line at bottom -->
  <path d="M120 400 L180 400 L200 370 L220 430 L240 380 L260 420 L280 400 L392 400" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        opacity="0.5"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#F7931E"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- 7K Text -->
  <text x="256" y="230" font-family="Arial Black, Arial, sans-serif" font-size="180" font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">7K</text>
  
  <!-- FIT Text smaller -->
  <text x="256" y="360" font-family="Arial, sans-serif" font-size="90" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle" letter-spacing="10">FIT</text>
</svg>

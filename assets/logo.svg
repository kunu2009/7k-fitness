<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>
  
  <!-- Inner glow -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
  
  <!-- 7K Text -->
  <text x="256" y="230" font-family="Arial Black, sans-serif" font-size="160" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">7K</text>
  
  <!-- FIT Text -->
  <text x="256" y="340" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="url(#accentGrad)" text-anchor="middle" dominant-baseline="middle">FIT</text>
  
  <!-- Fitness Icon - Dumbbell accent -->
  <g transform="translate(256, 420)">
    <rect x="-60" y="-8" width="120" height="16" rx="4" fill="rgba(255,255,255,0.9)"/>
    <rect x="-80" y="-20" width="25" height="40" rx="4" fill="rgba(255,255,255,0.9)"/>
    <rect x="55" y="-20" width="25" height="40" rx="4" fill="rgba(255,255,255,0.9)"/>
  </g>
  
  <!-- Energy lines -->
  <path d="M100 150 L130 180" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M80 200 L120 200" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M100 250 L130 220" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round"/>
  
  <path d="M412 150 L382 180" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M432 200 L392 200" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M412 250 L382 220" stroke="url(#accentGrad)" stroke-width="6" stroke-linecap="round"/>
</svg>
